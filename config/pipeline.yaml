# AI 热点短视频选题流水线 — 固定配置
# 顺序不可打乱：TrendRadar → X(Grok) → cheat-on-content 筛选 → 标准化脚本

name: ai-hotspot-pipeline
timezone: Asia/Shanghai
lookback_hours: 12
schedule_local: "09:00"

# Phase 1 — TrendRadar 目标源
trendradar:
  project_root: "/Users/qwe/tools/TrendRadar"
  # 热榜平台（id 对齐 config.yaml）
  platforms:
    - id: douyin
      name: 抖音
    - id: bilibili-hot-search
      name: B站热搜
    - id: zhihu
      name: 知乎
    - id: weibo
      name: 微博
    - id: toutiao
      name: 今日头条
    - id: baidu
      name: 百度热搜
  # 科技资讯：走 RSS + 综合热榜
  tech_rss_ids:
    - hacker-news
  # 小红书：TrendRadar 无官方源，Phase1.5 用 web 补充
  xiaohongshu_via: web_search
  max_items_per_platform: 80
  trigger_crawl_before_fetch: true

# Phase 2 — X / Twitter（Grok 原生工具）
# 优先：普通人能打开的工具/场景（修图、剪辑、写作、办公、插件接管）
x_sources:
  queries:
    - "(Codex OR Cursor OR Claude) (Photoshop OR PS OR 剪映 OR Excel OR 修图 OR 接管 OR 插件) min_faves:10"
    - "(\"AI tool\" OR 教程 OR 怎么用 OR 小白 OR 一键) (ChatGPT OR Claude OR 豆包 OR Gemini) min_faves:10"
    - "(AI修图 OR AI剪辑 OR AI写作 OR AI办公 OR AI字幕 OR 提示词) min_faves:5"
  limit_per_query: 10
  mode: Latest
  min_faves: 10

# Phase 3 — 筛选（受众：小白/普通人可触达，见 config/audience.yaml）
scoring:
  audience: beginner_everyday
  rubric: opinion-video-zero
  windows_hours: [6, 24]
  reject_if:
    heat_declining: true
    pure_industry_news: true
    high_homogenization: true
    too_far_from_everyday: true   # 霸权/资本开支/纯财报等硬剔
  keep_if:
    min_viral_prob_24h: 0.28
    min_short_video_score: 5.5
    min_actionable: true
    prefer_beginner: true
  top_n_keep: 20

# Phase 4 — 标准化内容产出字段（固定）
content_package_fields:
  - 选题标题
  - 爆款封面标题
  - 口播开场钩子
  - 分步骤实操拍摄流程
  - 推荐视频时长
  - 拍摄画面参考
  - 爆火概率_6h
  - 爆火概率_24h
  - 流量红利剩余时长
  - 同行内卷竞争度
  - 来源平台
  - 原始关键词

# 留存：永不清空
retention:
  archive_dir: "data/archive"           # 按日目录
  master_index: "data/history/master_index.jsonl"
  patterns_file: "data/history/patterns.md"
  never_delete: true
  use_history_for_scoring: true

paths:
  phase1: "data/archive/{date}/01_trendradar.json"
  phase2: "data/archive/{date}/02_merged.json"
  phase3: "data/archive/{date}/03_scored.json"
  phase4: "data/archive/{date}/04_packages.json"
  delivery_md: "output/latest/delivery.md"
  delivery_csv: "output/latest/delivery.csv"
  run_log: "logs/{date}.log"
