# 选题受众偏好 —— 小白/普通人可触达优先
# score_filter 与流水线必读

audience: beginner_everyday  # 普通人、小白、能跟着做

# 想要的内容（加分）
prefer:
  description: >
    像「Codex 直接接管 Photoshop 帮我修图」这种：
    工具就在电脑/手机上、步骤能复现、用完立刻有结果。
  keywords:
    - 教程
    - 怎么用
    - 上手
    - 实测
    - 一键
    - 免费
    - 修图
    - 抠图
    - 去水印
    - 剪辑
    - 配音
    - 字幕
    - 写作
    - 办公
    - Excel
    - PPT
    - Word
    - Photoshop
    - PS
    - 剪映
    - 小红书
    - 抖音
    - 提示词
    - Prompt
    - Cursor
    - Codex
    - Claude
    - ChatGPT
    - 豆包
    - 通义
    - 接管
    - 插件
    - 工作流
    - 副业
    - 学生
    - 打工人
    - 省时间
    - 3步
    - 5分钟
    - 保姆级
    - 小白

# 坚决不要（硬剔或大幅降权）
reject_or_downrank:
  description: >
    普通人插不上手的宏大叙事：地缘、霸权、资本开支战争、纯财报股价等。
  patterns:
    - 霸权
    - 中美AI
    - 美中
    - 全球AI市场
    - CAGR
    - 资本开支
    - capex
    - 军备
    - 地缘
    - 战争
    - 制裁
    - 监管法案
    - Kill Switch
    - 国会
    - 华尔街
    - Nasdaq
    - 道指
    - 标普
    - 期货
    - 财报
    - 股价
    - 分析师
    - 市值
    - 融资轮
    - 估值
    - 增资
    - 超级工厂
    - 行业标准
    - Harness标准
    - 商业智能体超级
    - 算力军备
    - 芯片军备
    - 国产替代叙事$
    - 权力斗争
    - 统治地位

# 软性降权（可保留但排后）
soft_downrank:
  - 专访
  - 对话.*CEO
  - WAIC
  - 大会
  - 白皮书
  - 战略
  - 生态共建
